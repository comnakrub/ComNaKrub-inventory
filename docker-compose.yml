services:
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    image: comnakrub-backend
    container_name: comnakrub-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/prod.db
      - PORT=3001
    volumes:
      - comnakrub-db:/data
    networks:
      - comnakrub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    image: comnakrub-frontend
    container_name: comnakrub-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8765}:80"
    depends_on:
      - backend
    networks:
      - comnakrub-net

volumes:
  comnakrub-db:
    name: comnakrub-db

networks:
  comnakrub-net:
    name: comnakrub-net
